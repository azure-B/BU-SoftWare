<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f0f0f;
      font-family: 'Courier New', monospace;
      color: #e5e5e5;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3.5rem;
      letter-spacing: 0.1em;
      color: #fff;
    }

    h1 span {
      color: #4ade80;
    }

    p {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #666;
      letter-spacing: 0.05em;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 1.2s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, <span>World</span>!</h1>
    <p><span class="dot"></span>Express server is running</p>
  </div>
</body>
</html>
