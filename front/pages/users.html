<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — express-app</title>
  <link rel="stylesheet" href="../styles/global.css" />
</head>
<body>
  <script src="../components/nav.js"></script>
  <script>renderNav();</script>

  <main>
    <div class="container">

      <h1>🧑 Users</h1>
      <p>In-memory 유저 목록 (서버 재시작 시 초기화)</p>

      <!-- 추가 폼 -->
      <div class="card">
        <h2>유저 추가</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:12px; align-items:end;">
          <div class="form-group" style="margin:0">
            <label>이름</label>
            <input type="text" id="inp-name" placeholder="홍길동" />
          </div>
          <div class="form-group" style="margin:0">
            <label>이메일</label>
            <input type="email" id="inp-email" placeholder="user@example.com" />
          </div>
          <button class="btn btn-primary" onclick="addUser()">추가</button>
        </div>
      </div>

      <!-- 목록 테이블 -->
      <div class="card">
        <table>
          <thead>
            <tr><th>ID</th><th>이름</th><th>이메일</th><th>상태</th><th></th></tr>
          </thead>
          <tbody id="user-list">
            <tr><td colspan="5" style="text-align:center; color:var(--muted)">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <script src="../components/nav.js"></script>
  <script src="../js/users.js"></script>
</body>
</html>
