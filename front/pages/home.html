<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home — express-app</title>
  <link rel="stylesheet" href="../styles/global.css" />
</head>
<body>
  <script src="../components/nav.js"></script>
  <script>renderNav();</script>

  <main>
    <div class="container">

      <h1>Hello, <span style="color:var(--accent)">World</span> 👋</h1>
      <p>Express MVC 보일러플레이트 예제 페이지입니다.</p>

      <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; margin-top:32px;">

        <div class="card">
          <h2>🧑 Users</h2>
          <p>In-memory 유저 CRUD 예제.<br/>목록 조회, 추가, 삭제.</p>
          <a href="users.html" class="btn btn-primary">보러 가기</a>
        </div>

        <div class="card">
          <h2>📝 Posts</h2>
          <p>제목 + 본문을 가진 게시글 예제.<br/>작성 / 삭제 가능.</p>
          <a href="posts.html" class="btn btn-primary">보러 가기</a>
        </div>

        <div class="card">
          <h2>🔢 Counter</h2>
          <p>서버 사이드 카운터 예제.<br/>increment / decrement / reset.</p>
          <a href="counter.html" class="btn btn-primary">보러 가기</a>
        </div>

      </div>

      <!-- API 헬스체크 -->
      <div class="card" style="margin-top:32px;">
        <h2>🟢 서버 상태</h2>
        <p id="status">확인 중...</p>
        <button class="btn btn-ghost" onclick="checkHealth()">다시 확인</button>
      </div>

    </div>
  </main>

  <script src="../js/home.js"></script>
</body>
</html>
