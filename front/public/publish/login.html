    <form class="w-full space-y-8">
    <!-- Input: Student ID -->

    <label class="block text-left font-label-md text-label-md text-primary uppercase tracking-widest mb-2 transition-colors group-focus-within:text-secondary">학번 (STUDENT ID)</label>

    </div>
    <!-- Input: Password -->

    <label class="block text-left font-label-md text-label-md text-primary uppercase tracking-widest mb-2 transition-colors group-focus-within:text-secondary">비밀번호 (PASSWORD)</label>

    <script>
            // Simple micro-interaction for the login card
            document.addEventListener('mousemove', (e) => {
                const card = document.querySelector('.login-card');
                if (!card) return;
                
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
    
            // Reset transform when mouse leaves
            document.addEventListener('mouseleave', () => {
                const card = document.querySelector('.login-card');
                if (card) card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            });
        </script>
