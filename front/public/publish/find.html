<style>
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Libre Caslon Text', serif;
            font-size: 40vw;
            color: rgba(13, 51, 127, 0.03);
            pointer-events: none;
            z-index: -1;
            user-select: none;
            white-space: nowrap;
        }
        .editorial-line {
            height: 1px;
            background-color: #C5A880;
            width: 100%;
        }
        input:focus {
            outline: none;
            border-bottom-width: 2px !important;
            border-color: #1d5abc !important;
        }
        .tab-active {
            color: #0d337f;
            border-bottom: 2px solid #C5A880;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md">
<!-- Top Navigation Suppression: Not rendered for transactional recovery screen -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-12 relative overflow-hidden">
<!-- Background Watermark -->
<div class="watermark">BU</div>
<!-- Central Recovery Card -->
<div class="w-full max-w-[500px] bg-white border border-decoration-gold relative z-10 p-8 md:p-12 shadow-sm">
<!-- Header Section -->
<div class="flex flex-col items-center mb-10 text-center">
<img alt="Baekseok University Logo" class="w-20 h-20 mb-4 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFqwGUfLF8devYv1xisJHJqcabEs4sgh5aoRG_GzCKbY4t100Hw-rGd1cbSQwLAASevq1KcKMlULTUl9nBAWiY5Wl3zjGeqiGnq53uYGfRgJjB03--jui6IcuhMG2GGSvfaLOMGInFn6rfubKCYiE9CE3NBskWYNVaFQ8g6dCC5hFCFxmYueOQjBZJRxBUlScIp14c0_VyMNSH4JmQJVsQvIxfqV41zk6PLAu7Wl6_AA2hbcC2hkvfVSidRBBVTdjc6y2TQS44eg"/>
<h1 class="font-headline-md text-headline-md text-brand-navy mb-1">백석 학생 허브</h1>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Account Recovery</p>
<div class="editorial-line mt-6"></div>
</div>
<!-- Tabs -->
<div class="flex border-b border-surface-variant mb-8">
<button class="flex-1 py-3 font-label-md text-label-md transition-all tab-active uppercase" id="tab-find-id" onclick="switchTab('find-id')">Find Student ID</button>
<button class="flex-1 py-3 font-label-md text-label-md text-on-surface-variant hover:text-brand-navy transition-all uppercase" id="tab-reset-pw" onclick="switchTab('reset-pw')">Reset Password</button>
</div>
<!-- Find ID Section -->
<div class="space-y-6" id="section-find-id">
<div class="flex flex-col">
<label class="font-label-md text-label-md text-brand-navy uppercase mb-2">Name</label>
<input class="bg-transparent border-t-0 border-x-0 border-b border-brand-navy py-2 font-body-md placeholder:text-outline-variant focus:ring-0 transition-all" placeholder="성명을 입력하세요" type="text"/>
</div>
<div class="flex flex-col">
<label class="font-label-md text-label-md text-brand-navy uppercase mb-2">Birthdate or Mobile</label>
<input class="bg-transparent border-t-0 border-x-0 border-b border-brand-navy py-2 font-body-md placeholder:text-outline-variant focus:ring-0 transition-all" placeholder="YYYYMMDD 또는 휴대전화번호" type="text"/>
</div>
<button class="w-full bg-brand-navy text-white py-4 font-label-md text-label-md uppercase tracking-widest hover:bg-secondary transition-colors mt-4">
                    Find My ID
                </button>
</div>
<!-- Reset Password Section -->
<div class="space-y-6 hidden" id="section-reset-pw">
<div class="flex flex-col">
<label class="font-label-md text-label-md text-brand-navy uppercase mb-2">Student ID (학번)</label>
<input class="bg-transparent border-t-0 border-x-0 border-b border-brand-navy py-2 font-body-md placeholder:text-outline-variant focus:ring-0 transition-all" placeholder="학번 10자리를 입력하세요" type="text"/>
</div>
<div class="flex flex-col">
<label class="font-label-md text-label-md text-brand-navy uppercase mb-2">Name</label>
<input class="bg-transparent border-t-0 border-x-0 border-b border-brand-navy py-2 font-body-md placeholder:text-outline-variant focus:ring-0 transition-all" placeholder="성명을 입력하세요" type="text"/>
</div>
<div class="flex flex-col">
<label class="font-label-md text-label-md text-brand-navy uppercase mb-2">Institutional E-mail</label>
<div class="flex items-center">
<input class="flex-1 bg-transparent border-t-0 border-x-0 border-b border-brand-navy py-2 font-body-md placeholder:text-outline-variant focus:ring-0 transition-all" placeholder="아이디" type="text"/>
<span class="mx-2 font-body-md">@bu.ac.kr</span>
</div>
</div>
<button class="w-full bg-brand-navy text-white py-4 font-label-md text-label-md uppercase tracking-widest hover:bg-secondary transition-colors mt-4">
                    Send Reset Link
                </button>
</div>
<!-- Marginalia / Bottom Links -->
<div class="mt-12 pt-6 border-t border-surface-variant flex flex-col sm:flex-row justify-between items-center gap-4">
<a class="font-label-md text-label-md text-brand-navy hover:text-secondary flex items-center transition-colors" href="#">
<span class="material-symbols-outlined text-sm mr-1">arrow_back</span>
                    Back to Login
                </a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-brand-navy transition-colors" href="#">
                    Need an account? <span class="font-bold underline decoration-gold">Sign Up</span>
</a>
</div>
</div>
</main>
<!-- Shared Component: Footer -->
<footer class="w-full py-12 px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-gutter bg-primary dark:bg-on-primary-fixed border-t border-secondary dark:border-secondary-fixed-dim">
<div class="flex flex-col items-center md:items-start gap-2">
<div class="font-label-md text-label-md uppercase tracking-widest text-on-primary">Baekseok Student Hub</div>
<p class="font-body-md text-body-md text-on-primary opacity-80">© Baekseok University. All rights reserved.</p>
</div>
<div class="flex flex-wrap justify-center gap-6">
<a class="font-body-md text-body-md text-on-primary opacity-80 hover:opacity-100 transition-opacity" href="#">Privacy Policy</a>
<a class="font-body-md text-body-md text-on-primary opacity-80 hover:opacity-100 transition-opacity" href="#">Terms of Service</a>
<a class="font-body-md text-body-md text-on-primary opacity-80 hover:opacity-100 transition-opacity" href="#">Campus Map</a>
<a class="font-body-md text-body-md text-on-primary opacity-80 hover:opacity-100 transition-opacity" href="#">Contact Support</a>
</div>
</footer>
<script>
        function switchTab(tabId) {
            const findIdSec = document.getElementById('section-find-id');
            const resetPwSec = document.getElementById('section-reset-pw');
            const findIdTab = document.getElementById('tab-find-id');
            const resetPwTab = document.getElementById('tab-reset-pw');

            if (tabId === 'find-id') {
                findIdSec.classList.remove('hidden');
                resetPwSec.classList.add('hidden');
                findIdTab.classList.add('tab-active');
                findIdTab.classList.remove('text-on-surface-variant');
                resetPwTab.classList.remove('tab-active');
                resetPwTab.classList.add('text-on-surface-variant');
            } else {
                findIdSec.classList.add('hidden');
                resetPwSec.classList.remove('hidden');
                resetPwTab.classList.add('tab-active');
                resetPwTab.classList.remove('text-on-surface-variant');
                findIdTab.classList.remove('tab-active');
                findIdTab.classList.add('text-on-surface-variant');
            }
        }
    </script>
</body></html>
