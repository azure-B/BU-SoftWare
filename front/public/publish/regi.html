<!DOCTYPE html><html class="light" lang="ko"><head>

    <style>/* --- common.css --- */
            body {
                background-color: #f7fafc;
                font-family: 'Hanken Grotesk', sans-serif;
                -webkit-font-smoothing: antialiased;
            }
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            }
            .footer-shared {
                border-top: 1px solid #ba9d76;
            }
            
            /* --- signup.css --- */
            .registration-card {
                border: 1px solid #C5A880;
                background: #ffffff;
                width: 100%;
                max-width: 480px;
            }
            .form-input-border {
                border: none;
                border-bottom: 1px solid #001e59;
                border-radius: 0;
                background: transparent;
                padding: 8px 0;
            }
            .form-input-border:focus {
                outline: none;
                border-bottom: 2px solid #1d5abc;
                box-shadow: none;
            }
            .editorial-rule {
                height: 1px;
                background-color: #C5A880;
                width: 60px;
                margin-top: 8px;
            }
            @media (max-width: 768px) {
                .registration-card {
                    max-width: 100%;
                    margin: 0 20px;
                    padding: 2rem !important;
                }
            }</style>
    </head>
    <body class="min-h-screen flex flex-col overflow-x-hidden">
    <!-- Top Navigation (Shell logic: Hidden for Transactional screen) -->
    <!-- The instructions mandate suppressing TopNavBar/SideNav for Login screens -->
    <main class="flex-grow flex items-center justify-center px-margin-mobile md:px-0 py-20 relative overflow-hidden">
    <!-- Editorial Background Element -->
    <div class="absolute top-0 right-0 w-1/3 h-full bg-surface-container-low -z-10 opacity-50"></div>
    <div class="absolute left-10 top-20 text-[200px] font-display-lg text-surface-variant/20 select-none pointer-events-none">BU</div>
    <!-- Login Card -->
    <div class="registration-card shadow-sm p-10 md:p-12 relative z-10 transition-all duration-500 hover:shadow-lg">
    <div class="flex flex-col items-center mb-10">
    <img alt="Baekseok University Logo" class="w-24 h-24 object-contain mb-6" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8481jA5BnkRHNYT3NpgBjhDgwKiDHeSwUkHKUi5728wrc6Y2kAyMz5nDQYWZlS82xuDfkEhOIWoXqVu9Be0_1MlQbngTQzn5FjxI-Rn2tf6N_HY-6tL-9PAR0g6-zAQ1LrTCwUn66ehhl8uthbyi8xnnI0dwFP2sdos-s43vBJzrFUU9StQsnRd7_tmopAtzOXgp4WJ43ZEydLwmLXI1fSxkuP6BC7q-92VtS2_6HjXcxEC8UCw3wwveCL7uMbrJlieaIG3CUDA">
    <div class="text-center">
    <h1 class="font-headline-md text-headline-md text-primary mb-1">회원가입</h1>
    <div class="editorial-rule mx-auto"></div>
    </div>
    </div>
    <form action="#" class="space-y-8" method="POST">
    <div class="flex flex-col">
    <label class="font-label-md text-label-md uppercase tracking-wider text-primary mb-1" for="name">성명 (NAME)</label>
    <input class="form-input-border font-body-md text-body-md w-full" id="name" name="name" placeholder="홍길동" required="" type="text">
    </div>
    <div class="flex flex-col">
    <label class="font-label-md text-label-md uppercase tracking-wider text-primary mb-1" for="student_id">학번 (STUDENT ID)</label>
    <input autocomplete="username" class="form-input-border font-body-md text-body-md w-full" id="student_id" maxlength="10" name="student_id" placeholder="2024000000" required="" type="text">
    </div>
    <div class="flex flex-col">
    <label class="font-label-md text-label-md uppercase tracking-wider text-primary mb-1" for="department">학과 (DEPARTMENT)</label>
    <select class="form-input-border font-body-md text-body-md w-full appearance-none" id="department" name="department"><option disabled="" selected="" value="">학과를 선택하세요</option>
    <option value="computer_science">컴퓨터공학부</option>
    <option value="advanced_it">첨단IT학부</option></select>
    </div>
    <div class="flex flex-col">
    <label class="font-label-md text-label-md uppercase tracking-wider text-primary mb-1" for="email">이메일 (EMAIL)</label>
    <div class="relative flex items-center gap-2">
    <div class="flex-grow flex items-center border-b border-primary">
    <input class="font-body-md text-body-md w-24 py-2 focus:outline-none bg-transparent appearance-none" id="email" name="email" placeholder="username" required="" type="text" style="border: none; box-shadow: none;">
    <span class="font-body-md text-body-md text-on-surface-variant opacity-60 px-2 flex-grow">@bu.ac.kr</span>
    </div>
    <button class="bg-primary text-on-primary px-4 py-2 font-label-md text-label-md uppercase tracking-wider hover:bg-secondary transition-all duration-300 whitespace-nowrap" type="button">인증번호 전송</button>
    </div>
    </div><div class="flex flex-col"><label class="font-label-md text-label-md uppercase tracking-wider text-primary mb-1" for="verification_code">인증번호 (VERIFICATION CODE)</label><div class="relative flex items-center gap-2"><input class="form-input-border font-body-md text-body-md flex-grow" id="verification_code" name="verification_code" placeholder="6자리 숫자" required="" type="text"><button class="bg-primary text-on-primary px-4 py-2 font-label-md text-label-md uppercase tracking-wider hover:bg-secondary transition-all duration-300 whitespace-nowrap" type="button">확인</button></div></div>
    <div class="flex flex-col relative">
    <label class="font-label-md text-label-md uppercase tracking-wider text-primary mb-1" for="password">비밀번호 (PASSWORD)</label>
    <div class="relative flex items-center">
    <input class="form-input-border font-body-md text-body-md w-full pr-10" id="password" name="password" required="" type="password">
    <button class="absolute right-0 text-primary-container focus:outline-none" type="button">
    <span class="material-symbols-outlined">visibility</span>
    </button>
    </div>
    </div>
    <div class="flex flex-col relative">
    <label class="font-label-md text-label-md uppercase tracking-wider text-primary mb-1" for="confirm_password">비밀번호 확인 (CONFIRM PASSWORD)</label>
    <div class="relative flex items-center">
    <input class="form-input-border font-body-md text-body-md w-full pr-10" id="confirm_password" name="confirm_password" required="" type="password">
    <button class="absolute right-0 text-primary-container focus:outline-none" type="button">
    <span class="material-symbols-outlined">visibility</span>
    </button>
    </div>
    </div>
    <div class="pt-6">
    <button class="w-full bg-primary text-on-primary py-4 font-label-md text-label-md tracking-widest uppercase hover:bg-secondary transition-all duration-300 ease-in-out shadow-md" type="submit">
                            가입하기
                        </button>
    </div>
    <div class="text-center pt-4">
    <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">
                            이미 계정이 있으신가요? <span class="text-primary font-bold border-b border-primary">로그인</span>
    </a>
    </div>
    </form>
    </div>
    </main>
    <!-- Footer: Shared Component Implementation -->
    <footer class="footer-shared w-full px-margin-desktop py-12 flex flex-col md:flex-row justify-between items-center gap-gutter bg-primary dark:bg-primary-container">
    <div class="flex flex-col gap-2">
    <h2 class="font-headline-lg text-headline-lg text-on-primary">BU</h2>
    <p class="font-body-md text-body-md text-on-primary/80 dark:text-on-primary-container/80">© 2024 Baekseok University. All rights reserved. Intellectual Excellence.</p>
    </div>
    <div class="flex flex-wrap justify-center md:justify-end gap-x-8 gap-y-4">
    <a class="font-label-md text-label-md text-on-primary/80 dark:text-on-primary-container/80 hover:text-on-tertiary-container transition-colors" href="#">Privacy Policy</a>
    <a class="font-label-md text-label-md text-on-primary/80 dark:text-on-primary-container/80 hover:text-on-tertiary-container transition-colors" href="#">Terms of Service</a>
    <a class="font-label-md text-label-md text-on-primary/80 dark:text-on-primary-container/80 hover:text-on-tertiary-container transition-colors" href="#">Campus Directory</a>
    <a class="font-label-md text-label-md text-on-primary/80 dark:text-on-primary-container/80 hover:text-on-tertiary-container transition-colors" href="#">Contact Registry</a>
    </div>
    </footer>
    <script>
            // Simple micro-interaction for the login card
            document.addEventListener('mousemove', (e) => {
                const card = document.querySelector('.login-card');
                if (!card) return;
                
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
    
            // Reset transform when mouse leaves
            document.addEventListener('mouseleave', () => {
                const card = document.querySelector('.login-card');
                if (card) card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            });
        </script>
    
    
    </body></html>
